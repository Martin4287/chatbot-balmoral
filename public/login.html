<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso - RESTalk</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <style>
    :root {
      --primary: #f59e0b;
      --primary-hover: #d97706;
      --bg-gradient: radial-gradient(circle at 10% 20%, rgb(4, 21, 37) 0%, rgb(2, 7, 12) 100.2%);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --glass-bg: rgba(17, 25, 40, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(255, 255, 255, 0.04);
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* Subtle background animated elements */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0) 70%);
      top: 10%;
      left: 15%;
      z-index: 1;
      pointer-events: none;
      animation: drift 15s infinite alternate ease-in-out;
    }
    .bg-glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(239, 68, 68, 0.06) 0%, rgba(239, 68, 68, 0) 70%);
      bottom: 10%;
      right: 15%;
      z-index: 1;
      pointer-events: none;
      animation: drift 20s infinite alternate-reverse ease-in-out;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      z-index: 10;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }

    .brand ion-icon {
      font-size: 3.5rem;
      color: var(--primary);
    }

    .brand h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .form-group {
      text-align: left;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper ion-icon {
      position: absolute;
      left: 1rem;
      font-size: 1.25rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    .form-control {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: #02070c;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 2rem;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .spin {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="login-container">
    <div class="brand">
      <ion-icon name="chatbubbles-outline"></ion-icon>
      <h1>RESTalk</h1>
      <p>Plataforma WhatsApp Inteligente para Restaurantes</p>
    </div>

    <div class="error-box" id="error-box">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span id="error-text">Usuario o contraseña incorrectos.</span>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <ion-icon name="person-outline"></ion-icon>
          <input type="text" id="username" class="form-control" placeholder="Ingresá tu usuario" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <ion-icon name="lock-closed-outline"></ion-icon>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn" id="btn-login">
        Ingresar <ion-icon name="arrow-forward-outline" id="arrow-icon"></ion-icon>
      </button>
    </form>
  </div>

  <script>
    // Si ya existe token, validar y redirigir
    const token = localStorage.getItem('admin_token');
    if (token) {
      fetch('/api/auth/session', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => {
        if (res.ok) {
          window.location.href = '/admin/';
        } else {
          localStorage.removeItem('admin_token');
          localStorage.removeItem('business_id');
          localStorage.removeItem('business_name');
        }
      })
      .catch(() => {});
    }

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const errorText = document.getElementById('error-text');
    const btnLogin = document.getElementById('btn-login');
    const arrowIcon = document.getElementById('arrow-icon');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      // Ocultar error y deshabilitar botón
      errorBox.style.display = 'none';
      btnLogin.disabled = true;
      btnLogin.innerHTML = 'Ingresando... <ion-icon name="sync-outline" class="spin"></ion-icon>';
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Error al iniciar sesión.');
        }
        
        // Guardar sesión
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('business_id', data.businessId);
        localStorage.setItem('business_name', data.name);
        
        // Redirigir al panel principal
        window.location.href = '/admin/';
        
      } catch (err) {
        btnLogin.disabled = false;
        btnLogin.innerHTML = 'Ingresar <ion-icon name="arrow-forward-outline"></ion-icon>';
        
        errorText.textContent = err.message;
        errorBox.style.display = 'flex';
      }
    });
  </script>
</body>
</html>
