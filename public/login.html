<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso - RISTapp</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <style>
    :root {
      --primary: #f59e0b;
      --primary-hover: #d97706;
      --bg-gradient: radial-gradient(circle at 10% 20%, rgb(4, 21, 37) 0%, rgb(2, 7, 12) 100.2%);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --glass-bg: rgba(17, 25, 40, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(255, 255, 255, 0.04);
      --danger: #ef4444;
      --accent: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      overflow-y: auto;
    }

    /* Subtle background animated elements */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0) 70%);
      top: 10%;
      left: 15%;
      z-index: 1;
      pointer-events: none;
      animation: drift 15s infinite alternate ease-in-out;
    }
    .bg-glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(239, 68, 68, 0.06) 0%, rgba(239, 68, 68, 0) 70%);
      bottom: 10%;
      right: 15%;
      z-index: 1;
      pointer-events: none;
      animation: drift 20s infinite alternate-reverse ease-in-out;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }

    .login-container {
      width: 100%;
      max-width: 520px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      z-index: 10;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
      transition: all 0.3s ease;
      margin: 2rem 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .brand ion-icon {
      font-size: 3.2rem;
      color: var(--primary);
    }

    .brand h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    /* Tabs para alternar */
    .auth-tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.3rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      margin-bottom: 2rem;
    }

    .auth-tab-btn {
      flex: 1;
      padding: 0.6rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .auth-tab-btn.active {
      background: var(--primary);
      color: #02070c;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
      text-align: left;
    }

    .form-group-full {
      grid-column: span 2;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper ion-icon {
      position: absolute;
      left: 1rem;
      font-size: 1.2rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    .form-control {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.8rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
    }

    .btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--primary);
      color: #02070c;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 1.5rem;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      animation: shake 0.4s ease;
    }

    .success-box {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--accent);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .spin {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    .helper-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="login-container">
    <div class="brand">
      <ion-icon name="chatbubbles-outline"></ion-icon>
      <h1>RISTapp</h1>
      <p>Chatbot inteligente para restaurantes, cafeterías y salones</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab-btn active" id="tab-login" onclick="switchTab('login')">Iniciar Sesión</button>
      <button class="auth-tab-btn" id="tab-register" onclick="switchTab('register')">Registrar Negocio</button>
    </div>

    <div class="error-box" id="error-box">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span id="error-text">Usuario o contraseña incorrectos.</span>
    </div>

    <div class="success-box" id="success-box">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      <span>¡Registro completado! Ingresando al panel...</span>
    </div>

    <!-- FORMULARIO DE INICIO DE SESIÓN -->
    <form id="login-form">
      <div class="form-grid" style="grid-template-columns: 1fr;">
        <div class="form-group">
          <label for="username">Usuario de Acceso</label>
          <div class="input-wrapper">
            <ion-icon name="person-outline"></ion-icon>
            <input type="text" id="username" class="form-control" placeholder="Ingresá tu usuario" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
      </div>

      <button type="submit" class="btn" id="btn-login">
        Ingresar <ion-icon name="arrow-forward-outline"></ion-icon>
      </button>
    </form>

    <!-- FORMULARIO DE REGISTRO DE NUEVO CLIENTE -->
    <form id="register-form" class="hidden">
      <div class="form-grid">
        <div class="form-group form-group-full">
          <label for="reg-name">Nombre del Negocio / Restaurante</label>
          <div class="input-wrapper">
            <ion-icon name="business-outline"></ion-icon>
            <input type="text" id="reg-name" class="form-control" placeholder="Ej: Pizza Club" required>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-username">Usuario Administrador</label>
          <div class="input-wrapper">
            <ion-icon name="person-outline"></ion-icon>
            <input type="text" id="reg-username" class="form-control" placeholder="Ej: pizzaclub" required>
          </div>
          <span class="helper-text">Solo letras y números, sin espacios.</span>
        </div>

        <div class="form-group">
          <label for="reg-password">Contraseña</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" id="reg-password" class="form-control" placeholder="Mínimo 6 caracteres" required>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-phone">WhatsApp de Ventas (Notificaciones)</label>
          <div class="input-wrapper">
            <ion-icon name="logo-whatsapp"></ion-icon>
            <input type="text" id="reg-phone" class="form-control" placeholder="Ej: 5492233041076" required>
          </div>
          <span class="helper-text">Número internacional con código de país.</span>
        </div>

        <div class="form-group">
          <label for="reg-email">Email de Alertas</label>
          <div class="input-wrapper">
            <ion-icon name="mail-outline"></ion-icon>
            <input type="email" id="reg-email" class="form-control" placeholder="Ej: admin@pizzaclub.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-instance">UltraMSG Instance ID</label>
          <div class="input-wrapper">
            <ion-icon name="key-outline"></ion-icon>
            <input type="text" id="reg-instance" class="form-control" placeholder="Ej: instance123456" required>
          </div>
          <span class="helper-text">Vincular para activar bot en WhatsApp.</span>
        </div>

        <div class="form-group">
          <label for="reg-token">UltraMSG Token</label>
          <div class="input-wrapper">
            <ion-icon name="shield-checkmark-outline"></ion-icon>
            <input type="text" id="reg-token" class="form-control" placeholder="Token de UltraMSG" required>
          </div>
        </div>
      </div>

      <button type="submit" class="btn" id="btn-register-submit">
        Registrar e Ingresar <ion-icon name="sparkles-outline"></ion-icon>
      </button>
    </form>
  </div>

  <script>
    // Si ya existe token, validar y redirigir
    const token = localStorage.getItem('admin_token');
    if (token) {
      fetch('/api/auth/session', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => {
        if (res.ok) {
          window.location.href = '/admin/';
        } else {
          localStorage.removeItem('admin_token');
          localStorage.removeItem('business_id');
          localStorage.removeItem('business_name');
        }
      })
      .catch(() => {});
    }

    // Toggle de pestañas
    function switchTab(tab) {
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const errorBox = document.getElementById('error-box');

      errorBox.style.display = 'none';

      if (tab === 'login') {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      } else {
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
      }
    }

    // Formulario de Login
    const loginForm = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const errorText = document.getElementById('error-text');
    const btnLogin = document.getElementById('btn-login');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      errorBox.style.display = 'none';
      btnLogin.disabled = true;
      btnLogin.innerHTML = 'Ingresando... <ion-icon name="sync-outline" class="spin"></ion-icon>';
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Error al iniciar sesión.');
        }
        
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('business_id', data.businessId);
        localStorage.setItem('business_name', data.name);
        
        window.location.href = '/admin/';
        
      } catch (err) {
        btnLogin.disabled = false;
        btnLogin.innerHTML = 'Ingresar <ion-icon name="arrow-forward-outline"></ion-icon>';
        errorText.textContent = err.message;
        errorBox.style.display = 'flex';
      }
    });

    // Formulario de Registro
    const registerForm = document.getElementById('register-form');
    const btnRegisterSubmit = document.getElementById('btn-register-submit');
    const successBox = document.getElementById('success-box');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('reg-name').value;
      const username = document.getElementById('reg-username').value;
      const password = document.getElementById('reg-password').value;
      const phone = document.getElementById('reg-phone').value;
      const email = document.getElementById('reg-email').value;
      const instance = document.getElementById('reg-instance').value;
      const token = document.getElementById('reg-token').value;

      errorBox.style.display = 'none';
      btnRegisterSubmit.disabled = true;
      btnRegisterSubmit.innerHTML = 'Registrando... <ion-icon name="sync-outline" class="spin"></ion-icon>';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, username, password, phone, email, instance, token })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Error en el registro del negocio.');
        }

        // Mostrar box de éxito e ingresar
        successBox.style.display = 'flex';
        
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('business_id', data.businessId);
        localStorage.setItem('business_name', data.name);

        setTimeout(() => {
          window.location.href = '/admin/';
        }, 1200);

      } catch (err) {
        btnRegisterSubmit.disabled = false;
        btnRegisterSubmit.innerHTML = 'Registrar e Ingresar <ion-icon name="sparkles-outline"></ion-icon>';
        errorText.textContent = err.message;
        errorBox.style.display = 'flex';
      }
    });
  </script>
</body>
</html>
